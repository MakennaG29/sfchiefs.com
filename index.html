<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sfchiefs.com | Unblocked Games</title>
    <style>
        :root {
            --bg-color: #1a0826;     /* Poki-style deep purple background */
            --card-bg: #29153b;     /* Deep contrast container tiles */
            --accent-color: #ffde00; /* Poki vivid primary yellow */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--accent-color);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--accent-color);
            text-decoration: none;
            letter-spacing: -1px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        /* Poki Masonry-Style Asymmetric Grid System */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            grid-auto-rows: 130px;
            grid-auto-flow: dense;  /* Automatically fills in visual layout gaps */
            gap: 16px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Poki Bubble 3D Button Style */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            border-bottom: 6px solid rgba(0,0,0,0.4); 
            position: relative;
            display: block;
        }

        .game-card:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Large Featured Block (2x2 spaces) */
        .game-card.featured-large {
            grid-column: span 2;
            grid-row: span 2;
        }

        /* Wide Featured Block (2x1 spaces) */
        .game-card.featured-wide {
            grid-column: span 2;
            grid-row: span 1;
        }

        /* High Featured Block (1x2 spaces) */
        .game-card.featured-high {
            grid-column: span 1;
            grid-row: span 2;
        }

        /* Card Thumbnail Images */
        .game-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Hover Overlay Text */
        .game-card h3 {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            margin: 0;
            padding: 15px 10px 10px 10px;
            font-size: 0.95rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }

        .game-card:hover h3 {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">sfchiefs</a>
    </header>

    <main class="game-grid">

        <!-- 1. Subway Surfers (Large 2x2 Feature Block) -->
        <a href="games/subway-surfers/index.html" class="game-card featured-large">
            <img class="game-thumbnail" src="crazygames.com" alt="Subway Surfers">
            <h3>Subway Surfers</h3>
        </a>

        <!-- 2. 2048 (Standard 1x1 Block) -->
        <a href="games/2048/index.html" class="game-card">
            <img class="game-thumbnail" src="crazygames.com" alt="2048">
            <h3>2048</h3>
        </a>

        <!-- 3. Hextris (Wide 2x1 Block) -->
        <a href="games/hextris/index.html" class="game-card featured-wide">
            <img class="game-thumbnail" src="crazygames.com" alt="Hextris">
            <h3>Hextris</h3>
        </a>

        <!-- 4. Retro Bowl (High 1x2 Block) -->
        <a href="games/retro-bowl/index.html" class="game-card featured-high">
            <img class="game-thumbnail" src="crazygames.com" alt="Retro Bowl">
            <h3>Retro Bowl</h3>
        </a>

        <!-- 5. Smash Karts (Standard 1x1 Block) -->
        <a href="games/smash-karts/index.html" class="game-card">
            <img class="game-thumbnail" src="crazygames.com" alt="Smash Karts">
            <h3>Smash Karts</h3>
        </a>

    </main>

</body>
</html>
