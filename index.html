<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sfchiefs.com | Unblocked Games</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        header {
            padding: 20px;
            background-color: #1f1f1f;
            border-bottom: 3px solid #ffb300;
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .game-card {
            background-color: #1f1f1f;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, border-color 0.2s;
        }
        .game-card:hover {
            transform: scale(1.05);
            border-color: #ffb300;
        }
        .game-icon {
            width: 80px;
            height: 80px;
            background-color: #333;
            margin: 0 auto 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>sfchiefs.com</h1>
        <p>Your Home for Unblocked Games</p>
    </header>

    <main class="game-grid">
        <!-- Game 1 Placeholder -->
        <a href="games/retro-runner/index.html" class="game-card">
            <div class="game-icon">🏃‍♂️</div>
            <h3>Retro Runner</h3>
        </a>

        <!-- Game 2 Placeholder -->
        <a href="games/block-puzzle/index.html" class="game-card">
            <div class="game-icon">🧱</div>
            <h3>Block Puzzle</h3>
        </a>

        <!-- Game 3 Placeholder -->
        <a href="games/space-dodge/index.html" class="game-card">
            <div class="game-icon">🚀</div>
            <h3>Space Dodge</h3>
        </a>
    </main>

</body>
</html>
